name: Garmin Weight Sync

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Generate scaleconnect.yaml dynamically
        run: |
          cat <<EOF > scaleconnect.yaml
          sync_garmin:
            from: xiaomihome ${{ secrets.XIAOMI_USER }} ${{ secrets.XIAOMI_PASS }} ru yunmai.scales.ms104
            to: garmin ${{ secrets.GARMIN_USER }} ${{ secrets.GARMIN_PASS }}
          EOF

      - name: Run SmartScaleConnect (Go)
        run: go run main.go
